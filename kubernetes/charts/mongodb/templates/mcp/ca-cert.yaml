{{- if and .Values.mcp.enabled .Values.mcp.auth.enabled .Values.mcp.auth.tls.autoGenerated.enabled (eq .Values.mcp.auth.tls.autoGenerated.engine "cert-manager") }}
{{- if empty .Values.mcp.auth.tls.autoGenerated.certManager.existingIssuer }}
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ printf "%s-mcp-auth-selfsigned-issuer" (include "common.names.fullname" .) }}
  namespace: {{ include "mongodb.namespace" . | quote }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 4 }}
    app.kubernetes.io/component: mcp
  {{- if .Values.commonAnnotations }}
  annotations: {{- include "common.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
  {{- end }}
spec:
  selfSigned: {}
---
{{- end }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ printf "%s-mcp-auth-ca-crt" (include "common.names.fullname" .) }}
  namespace: {{ include "mongodb.namespace" . | quote }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 4 }}
    app.kubernetes.io/component: mcp
  {{- if .Values.commonAnnotations }}
  annotations: {{- include "common.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
  {{- end }}
spec:
  secretName: {{ printf "%s-mcp-auth-ca-crt" (include "common.names.fullname" .) }}
  commonName: {{ printf "%s-mcp-auth-root-ca" (include "common.names.fullname" .) }}
  isCA: true
  issuerRef:
    name: {{ default (printf "%s-mcp-auth-selfsigned-issuer" (include "common.names.fullname" .)) .Values.mcp.auth.tls.autoGenerated.certManager.existingIssuer }}
    kind: {{ default "Issuer" .Values.mcp.auth.tls.autoGenerated.certManager.existingIssuerKind }}
  privateKey:
    algorithm: {{ .Values.mcp.auth.tls.autoGenerated.certManager.keyAlgorithm }}
    size: {{ int .Values.mcp.auth.tls.autoGenerated.certManager.keySize }}
  duration: {{ .Values.mcp.auth.tls.autoGenerated.certManager.duration }}
  renewBefore: {{ .Values.mcp.auth.tls.autoGenerated.certManager.renewBefore }}
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ printf "%s-mcp-auth-ca-issuer" (include "common.names.fullname" .) }}
  namespace: {{ include "mongodb.namespace" . | quote }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 4 }}
    app.kubernetes.io/component: mcp
  {{- if .Values.commonAnnotations }}
  annotations: {{- include "common.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
  {{- end }}
spec:
  ca:
    secretName: {{ printf "%s-mcp-auth-ca-crt" (include "common.names.fullname" .) }}
{{- end }}
