{{- if and .Values.mcp.enabled .Values.mcp.auth.enabled (not .Values.mcp.auth.tls.existingSecret) (or (not .Values.mcp.auth.tls.autoGenerated.enabled) (and .Values.mcp.auth.tls.autoGenerated.enabled (eq .Values.mcp.auth.tls.autoGenerated.engine "helm"))) }}
{{- $secretName := include "mongodb.mcp.auth.tls.secretName" . }}
{{- $caValue := "" }}
{{- $certValue := "" }}
{{- $keyValue := "" }}
{{- if .Values.mcp.auth.tls.autoGenerated.enabled }}
  {{- $ca := genCA "mongodb-mcp-auth-ca" 365 }}
  {{- $serviceName := include "mongodb.mcp.fullname" . }}
  {{- $ipAddresses := ternary (list "127.0.0.1") nil .Values.mcp.auth.tls.autoGenerated.loopback }}
  {{- $sans := include "common.certs.sans" (dict "namespace" (include "mongodb.namespace" .) "clusterDomain" .Values.clusterDomain "serviceName" $serviceName "loopback" .Values.mcp.auth.tls.autoGenerated.loopback "extraSANs" (.Values.mcp.auth.tls.autoGenerated.extraSANs | default (list))) | splitList " " | uniq }}
  {{- $cert := genSignedCert $serviceName $ipAddresses $sans 365 $ca }}
  {{- $caValue = $ca.Cert }}
  {{- $certValue = $cert.Cert }}
  {{- $keyValue = $cert.Key }}
{{- else }}
  {{- $certValue = required "When mcp.auth.tls.autoGenerated.enabled=false you need to provide mcp.auth.tls.cert" .Values.mcp.auth.tls.cert }}
  {{- $keyValue = required "When mcp.auth.tls.autoGenerated.enabled=false you need to provide mcp.auth.tls.key" .Values.mcp.auth.tls.key }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ include "mongodb.namespace" . | quote }}
  labels: {{- include "common.labels.standard" (dict "customLabels" .Values.commonLabels "context" .) | nindent 4 }}
    app.kubernetes.io/component: mcp
  {{- if .Values.commonAnnotations }}
  annotations: {{- include "common.tplvalues.render" (dict "value" .Values.commonAnnotations "context" .) | nindent 4 }}
  {{- end }}
type: kubernetes.io/tls
data:
  tls.crt: {{ include "common.secrets.lookup" (dict "secret" $secretName "key" "tls.crt" "defaultValue" $certValue "context" .) }}
  tls.key: {{ include "common.secrets.lookup" (dict "secret" $secretName "key" "tls.key" "defaultValue" $keyValue "context" .) }}
  {{- if $caValue }}
  ca.crt: {{ include "common.secrets.lookup" (dict "secret" $secretName "key" "ca.crt" "defaultValue" $caValue "context" .) }}
  {{- end }}
{{- end }}
