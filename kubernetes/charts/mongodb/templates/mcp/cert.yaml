{{- if and .Values.mcp.enabled .Values.mcp.auth.enabled .Values.mcp.auth.tls.autoGenerated.enabled (eq .Values.mcp.auth.tls.autoGenerated.engine "cert-manager") }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ printf "%s-mcp-auth-crt" (include "common.names.fullname" .) }}
  namespace: {{ include "mongodb.namespace" . | quote }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 4 }}
    app.kubernetes.io/component: mcp
  {{- if .Values.commonAnnotations }}
  annotations: {{- include "common.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
  {{- end }}
spec:
  secretName: {{ include "mongodb.mcp.auth.tls.secretName" . }}
  commonName: {{ printf "%s.%s.svc.%s" (include "mongodb.mcp.fullname" .) (include "mongodb.namespace" .) .Values.clusterDomain }}
  issuerRef:
    {{- if .Values.mcp.auth.tls.autoGenerated.certManager.existingIssuer }}
    name: {{ .Values.mcp.auth.tls.autoGenerated.certManager.existingIssuer }}
    kind: {{ .Values.mcp.auth.tls.autoGenerated.certManager.existingIssuerKind }}
    {{- else }}
    name: {{ printf "%s-mcp-auth-ca-issuer" (include "common.names.fullname" .) }}
    kind: Issuer
    {{- end }}
  subject:
    organizations:
      - "MongoDB MCP Auth"
  dnsNames:
    {{- $dnsNames := include "common.certs.sans" (dict "namespace" (include "mongodb.namespace" .) "clusterDomain" .Values.clusterDomain "serviceName" (include "mongodb.mcp.fullname" .) "loopback" .Values.mcp.auth.tls.autoGenerated.loopback "extraSANs" (.Values.mcp.auth.tls.autoGenerated.extraSANs | default (list))) | splitList " " | uniq }}
    {{- range $dnsNames }}
    - {{ . | quote }}
    {{- end }}
  {{- if .Values.mcp.auth.tls.autoGenerated.loopback }}
  ipAddresses:
    - 127.0.0.1
  {{- end }}
  privateKey:
    algorithm: {{ .Values.mcp.auth.tls.autoGenerated.certManager.keyAlgorithm }}
    size: {{ int .Values.mcp.auth.tls.autoGenerated.certManager.keySize }}
  duration: {{ .Values.mcp.auth.tls.autoGenerated.certManager.duration }}
  renewBefore: {{ .Values.mcp.auth.tls.autoGenerated.certManager.renewBefore }}
{{- end }}
